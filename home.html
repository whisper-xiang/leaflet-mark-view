<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Mark View</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body class="is-home">

<div class="app-shell">
  <main class="content-area" id="contentArea">
    <div class="empty-state" id="emptyState">

      <div class="empty-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
        </svg>
      </div>

      <div class="empty-title">在本地阅读你的 Markdown</div>
      <div class="empty-desc">
        打开一个文件夹浏览全部 .md 文件，或直接打开单个 Markdown 文件。
      </div>

      <div class="empty-actions">
        <button class="empty-btn ghost" id="resumeBtn" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
          继续阅读
        </button>

        <div class="open-menu">
          <button class="empty-btn open-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9h18M3 9a2 2 0 0 1 2-2h4l2 2"/><path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/>
            </svg>
            Open
          </button>
          <div class="open-menu-list" role="menu">
            <button type="button" id="openFolderBtn" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
              Open Folder
            </button>
            <button type="button" id="openFileBtn" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
              Open File
            </button>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Drag-and-drop overlay -->
<div class="drag-overlay" id="dragOverlay">
  <div class="drag-overlay-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>
      <path d="M14 2v6h6"/>
      <path d="M12 12v6M9 15l3 3 3-3"/>
    </svg>
    <span>松开以打开</span>
  </div>
</div>

<script src="home.js"></script>
</body>
</html>
