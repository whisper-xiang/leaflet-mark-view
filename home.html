<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <!-- New-tab takeover gate. Must be the first script and external (MV3 CSP
       blocks inline). Render-blocking in <head>, so it runs before any paint. -->
  <script src="newtab-gate.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Mark View</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body class="is-home">

<!-- Top-right home tools: customise the background image -->
<div class="home-tools" id="homeTools">
  <div class="bg-menu" id="bgMenu">
    <button class="home-tool-btn bg-trigger" type="button" id="bgTriggerBtn"
      aria-haspopup="true" aria-expanded="false" title="更换背景">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="M21 15l-5-5L5 21"/>
      </svg>
    </button>
    <div class="bg-menu-list" role="menu">
      <button type="button" id="bgChooseBtn" role="menuitem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        选择本地图片
      </button>
      <button type="button" id="bgResetBtn" role="menuitem">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        恢复默认背景
      </button>
    </div>
  </div>
  <input type="file" id="bgFileInput" accept="image/*" hidden>
</div>

<div class="app-shell">
  <main class="content-area" id="contentArea">
    <div class="empty-state" id="emptyState">

      <div class="empty-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
        </svg>
      </div>

      <div class="empty-title">在此闲读</div>
      <div class="empty-desc">
        文件夹、单篇，拖入亦可。
      </div>

      <div class="empty-actions">
        <div class="open-menu">
          <button class="empty-btn open-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9h18M3 9a2 2 0 0 1 2-2h4l2 2"/><path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/>
            </svg>
            Open
          </button>
          <div class="open-menu-list" role="menu">
            <button type="button" id="openFolderBtn" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
              Open Folder
            </button>
            <button type="button" id="openFileBtn" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
              Open File
            </button>
            <button type="button" id="openUrlBtn" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              Open URL
            </button>
          </div>
        </div>

        <div class="resume-wrap" id="resumeWrap" style="display:none">
          <button class="empty-btn ghost" id="resumeBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
            继续阅读
          </button>
          <div class="favorites-popover" id="favoritesPopover" aria-hidden="true">
            <div class="favorites-popover-title">最近阅读</div>
            <ul class="favorites-list" id="favoritesList"></ul>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<!-- Drag-and-drop overlay -->
<div class="drag-overlay" id="dragOverlay">
  <div class="drag-overlay-inner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>
      <path d="M14 2v6h6"/>
      <path d="M12 12v6M9 15l3 3 3-3"/>
    </svg>
    <span>松手即开</span>
  </div>
</div>

<!-- ── Remote URL modal ── -->
<div class="search-backdrop" id="urlModalBackdrop"></div>
<div class="search-modal" id="urlModal" role="dialog" aria-modal="true" aria-label="打开远程链接">
  <div class="search-modal-box">
    <div class="search-modal-head">
      <svg class="search-modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
      </svg>
      <input class="search-modal-input" id="urlModalInput" placeholder="粘贴 GitHub 仓库或 .md 链接…" autocomplete="off"
        spellcheck="false">
      <button class="search-modal-clear" id="urlModalClear" title="关闭">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="url-modal-error" id="urlModalError" hidden></div>
    <div class="search-modal-footer">
      <span class="sm-hint">支持 GitHub 仓库、文件页、raw 直链</span>
      <span class="sm-hint"><kbd>↵</kbd> 打开</span>
      <span class="sm-hint"><kbd>esc</kbd> 关闭</span>
    </div>
  </div>
</div>

<script src="lmv-db.js"></script>
<script src="remote-md.js"></script>
<script src="home.js"></script>
</body>
</html>
