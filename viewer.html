<!DOCTYPE html>
<html lang="zh" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Mark View</title>
  <link rel="stylesheet" href="viewer.css">
</head>

<body class="bg-off">

  <!-- App shell: sidebar (left) | main-col (topbar + content, right) -->
  <div class="app-shell">

    <!-- ── Sidebar (full-height left column) ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button type="button" class="topbar-logo" id="homeBtn" title="回到主页">
          <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />
            <path d="M2 21c0-3 1.85-5.36 5.08-6" />
          </svg>
          Leaflet Mark View
        </button>
      </div>

      <div class="sidebar-inner">

        <div class="sidebar-nav" id="sidebarNav">
          <span class="sidebar-loc" id="locLabel">
            <svg class="loc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />
            </svg>
            <span class="loc-name">未选择</span>
          </span>
          <span class="sidebar-stats" id="fileStats"></span>
          <button class="sidebar-up" id="upLevel" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
              stroke-linejoin="round">
              <path d="M12 19V5M5 12l7-7 7 7" />
            </svg>
          </button>
        </div>

        <div class="file-tree" id="fileTree">
          <div class="sidebar-empty">选择一个文件夹开始浏览</div>
        </div>

      </div><!-- /.sidebar-inner -->

      <div class="sidebar-footer">
        <div class="open-menu up">
          <button class="sb-action primary open-trigger" type="button" aria-haspopup="true" aria-expanded="false"
            title="打开文件夹或文件">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
              stroke-linejoin="round">
              <path
                d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />
            </svg>
            Open
            <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
          <div class="open-menu-list" role="menu">
            <button type="button" data-action="folder" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <path
                  d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />
              </svg>
              Open Folder
            </button>
            <button type="button" data-action="file" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" />
                <path d="M14 2v6h6" />
              </svg>
              Open File
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main column: topbar on top, content below ── -->
    <div class="main-col">

      <!-- Top bar (sits above content area, not above sidebar) -->
      <header class="topbar">
        <button class="btn-icon sidebar-expand" id="sidebarExpand" title="展开侧边栏" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
            stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <path d="M9 3v18" />
          </svg>
        </button>
        <!-- Search trigger (opens modal) -->
        <button type="button" class="topbar-search-wrap" id="searchTrigger" title="搜索 (⌘K)">
          <svg class="topbar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7" />
            <path d="m21 21-4.3-4.3" />
          </svg>
          <span class="topbar-search-placeholder">搜索文件…</span>
          <kbd class="topbar-search-kbd">⌘K</kbd>
        </button>


        <div class="topbar-fill"></div>

        <div class="topbar-actions">

          <button class="btn-icon" id="themeToggle" title="切换主题"></button>

          <div class="settings-menu">
            <button class="btn-icon" id="settingsTrigger" title="设置" aria-haspopup="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                stroke-linejoin="round">
                <circle cx="12" cy="12" r="3" />
                <path
                  d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </button>
            <div class="settings-list" role="menu">
              <button class="settings-item" id="fontSizeToggle" role="menuitem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M4 19V7a2 2 0 0 1 2-2h2M4 13h6M14 19v-8a2 2 0 0 1 2-2h2M14 15h6" />
                </svg>
                <span class="settings-label">字体大小</span><span class="settings-val" id="fontSizeLabel">中</span>
              </button>
              <button class="settings-item" id="outlineToggle" role="menuitem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                  stroke-linejoin="round">
                  <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                </svg>
                <span class="settings-label">显示 / 隐藏大纲</span>
              </button>
              <button class="settings-item" id="bgToggle" role="menuitem">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"
                  stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" />
                  <circle cx="9" cy="9" r="2" />
                  <path d="m21 15-5-5L5 21" />
                </svg>
                <span class="settings-label">背景图</span><span class="settings-val" id="bgToggleLabel">开</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Doc viewport: scroll at window right edge; outline sticky beside content -->
      <div class="doc-viewport" id="contentArea">
        <div class="doc-viewport-row">
          <div class="doc-scroll-body">
            <main class="content-area">
              <div class="doc-layout">
                <div class="doc-main">

                  <!-- Empty state -->
                  <div class="empty-state" id="emptyState">
                    <div class="viewer-no-file">从侧边栏选择文件，或点击 Open 打开文件夹 / 文件</div>
                  </div>

                  <!-- Markdown output -->
                  <article class="markdown-body vp-doc" id="markdownBody" style="display:none"></article>

                  <!-- Prev/next navigation -->
                  <nav class="doc-footer" id="docFooter" style="display:none">
                    <button class="doc-footer-btn doc-footer-prev" id="docPrev">
                      <span class="doc-footer-label">上一篇</span>
                      <span class="doc-footer-title" id="docPrevTitle"></span>
                    </button>
                    <button class="doc-footer-btn doc-footer-next" id="docNext">
                      <span class="doc-footer-label">下一篇</span>
                      <span class="doc-footer-title" id="docNextTitle"></span>
                    </button>
                  </nav>

                </div><!-- /.doc-main -->
              </div><!-- /.doc-layout -->
            </main>
          </div><!-- /.doc-scroll-body -->

          <aside class="outline empty" id="outline">
            <nav class="outline-nav" aria-label="页面目录">
              <div class="outline-content">
                <div class="outline-marker" id="outlineMarker"></div>
                <div class="outline-title">目录</div>
                <ul class="outline-root" id="outlineRoot"></ul>
              </div>
            </nav>
          </aside>
        </div><!-- /.doc-viewport-row -->
      </div>

    </div><!-- /.main-col -->

  </div><!-- /.app-shell -->

  <!-- Floating prev/next file pager (bottom-right) -->
  <div class="pager" id="pager">
    <button class="pager-btn" id="pagerPrev" title="上一篇">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="m15 18-6-6 6-6" />
      </svg>
    </button>
    <span class="pager-div"></span>
    <button class="pager-btn" id="pagerNext" title="下一篇">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="m9 18 6-6-6-6" />
      </svg>
    </button>
  </div>

  <!-- Drag-and-drop overlay -->
  <div class="drag-overlay" id="dragOverlay">
    <div class="drag-overlay-inner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round">
        <path
          d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z" />
        <path d="M12 11v6M9 14l3 3 3-3" />
      </svg>
      <span>松开以打开文件夹或文件</span>
    </div>
  </div>

  <!-- ── Search modal ── -->
  <div class="search-backdrop" id="searchBackdrop"></div>
  <div class="search-modal" id="searchModal" role="dialog" aria-modal="true" aria-label="搜索">
    <div class="search-modal-box">
      <div class="search-modal-head">
        <svg class="search-modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input class="search-modal-input" id="searchModalInput" placeholder="搜索文件…" autocomplete="off"
          spellcheck="false">
        <button class="search-modal-clear" id="searchModalClear" title="清除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="search-modal-results" id="searchModalResults"></div>
      <div class="search-modal-footer">
        <span class="sm-hint"><kbd>↑</kbd><kbd>↓</kbd> to navigate</span>
        <span class="sm-hint"><kbd>↵</kbd> to select</span>
        <span class="sm-hint"><kbd>esc</kbd> to close</span>
      </div>
    </div>
  </div>

  <div class="tree-context-menu" id="treeContextMenu" role="menu" hidden>
    <button type="button" class="tree-context-item" id="treeContextReveal" role="menuitem"></button>
  </div>

  <script src="lmv-db.js"></script>
  <script src="markdown.js"></script>
  <script src="viewer.js"></script>
</body>

</html>
