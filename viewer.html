<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Mark View</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <button type="button" class="topbar-logo" id="homeBtn" title="回到主页">
    <svg class="leaf" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
      <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
    </svg>
    Leaflet Mark View
  </button>

  <div class="topbar-divider"></div>

  <div class="topbar-file-path" id="filePath">未打开文件</div>

  <div class="topbar-actions">
    <!-- Contextual: only shown while editing source -->
    <button class="btn-icon" id="saveFile" title="保存 (⌘/Ctrl+S)" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8M7 3v5h8"/>
      </svg>
    </button>
    <span class="readonly-hint" id="readonlyHint" style="display:none" title="此来源（file:// 直接打开）无法原地写回，保存时将弹出「另存为」">只读 · 另存</span>

    <button class="btn-icon edit-fab" id="editToggle" aria-label="源码 / 编辑">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m16 18 6-6-6-6M8 6l-6 6 6 6"/></svg>
    </button>

    <button class="btn-icon" id="themeToggle" title="切换主题"></button>

    <!-- Settings: hover to reveal the operation list -->
    <div class="settings-menu">
      <button class="btn-icon" id="settingsTrigger" title="设置" aria-haspopup="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div class="settings-list" role="menu">
        <button class="settings-item" id="fontSizeToggle" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V7a2 2 0 0 1 2-2h2M4 13h6M14 19v-8a2 2 0 0 1 2-2h2M14 15h6"/></svg>
          <span class="settings-label">字体大小</span><span class="settings-val" id="fontSizeLabel">中</span>
        </button>
        <button class="settings-item" id="widthToggle" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 9v6M3 9v6M8 12h8M8 12l2.5-2.5M8 12l2.5 2.5M16 12l-2.5-2.5M16 12l-2.5 2.5"/></svg>
          <span class="settings-label">内容宽度</span><span class="settings-val" id="widthLabel">中</span>
        </button>
        <button class="settings-item" id="outlineToggle" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
          <span class="settings-label">显示 / 隐藏大纲</span>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- App shell -->
<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-tabs" id="sidebarTabs">
      <button class="sb-tab" type="button" data-tab="folder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
        文件夹
      </button>
      <button class="sb-tab active" type="button" data-tab="file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
        文件
      </button>
    </div>
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <div class="sidebar-folder-name" id="folderName">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
          </svg>
          <span id="folderNameText">未选择文件夹</span>
        </div>
        <button class="btn-icon" id="sidebarToggle" title="收起侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-stats" id="fileStats"></div>
    </div>

    <div class="sidebar-search">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索文件">
      </div>
    </div>

    <div class="file-tree" id="fileTree">
      <div class="sidebar-empty">选择一个文件夹开始浏览</div>
    </div>

    <div class="sidebar-footer">
      <div class="open-menu up">
        <button class="sb-action primary open-trigger" type="button" aria-haspopup="true" aria-expanded="false" title="打开文件夹或文件">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
          </svg>
          Open
          <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        <div class="open-menu-list" role="menu">
          <button type="button" data-action="folder" role="menuitem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
            Open Folder
          </button>
          <button type="button" data-action="file" role="menuitem">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
            Open File
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Floating button to reopen the sidebar once it's collapsed -->
  <button class="sidebar-expand" id="sidebarExpand" title="展开侧边栏">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/>
    </svg>
  </button>

  <!-- Main content -->
  <main class="content-area" id="contentArea">

    <!-- Welcome / empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
        </svg>
      </div>
      <div class="empty-title">在本地阅读你的 Markdown</div>
      <div class="empty-desc">
        打开一个文件夹浏览全部 .md 文件，或直接打开单个 Markdown 文件。
      </div>
      <div class="empty-actions">
        <div class="open-menu">
          <button class="empty-btn open-trigger" type="button" aria-haspopup="true" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9h18M3 9a2 2 0 0 1 2-2h4l2 2"/><path d="M3 9v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"/>
            </svg>
            Open
            <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="open-menu-list" role="menu">
            <button type="button" data-action="folder" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
              Open Folder
            </button>
            <button type="button" data-action="file" role="menuitem">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/></svg>
              Open File
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Markdown output (hidden until folder is loaded) -->
    <article class="markdown-body" id="markdownBody" style="display:none"></article>

    <!-- Raw source editor (shown when source mode is toggled) -->
    <textarea class="source-editor" id="sourceEditor" spellcheck="false" style="display:none"></textarea>

  </main>

  <!-- Outline / table of contents -->
  <aside class="outline empty" id="outline">
    <div class="outline-title">本页大纲</div>
    <nav class="outline-list" id="outlineList"></nav>
  </aside>

</div>

<script src="markdown.js"></script>
<script src="viewer.js"></script>
</body>
</html>
