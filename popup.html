<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet Mark View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fcfcfb;
      --surface: #f5f5f3;
      --border: #e6e6e1;
      --text: #1a1a17;
      --text-muted: #6b6b63;
      --text-faint: #9a9a90;
      --accent: #2f6f4e;
      --accent-hover: #275d42;
      --accent-soft: #e9f1ec;
      --accent-on: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101210;
        --surface: #0b0d0b;
        --border: #23261f;
        --text: #e7e9e3;
        --text-muted: #8a8d83;
        --text-faint: #5c6057;
        --accent: #5fae84;
        --accent-hover: #6ebf93;
        --accent-soft: #16241c;
        --accent-on: #0b0d0b;
      }
    }

    body {
      width: 300px;
      font-family: ui-sans-serif, -apple-system, "SF Pro Text", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    svg { display: block; }

    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      background: var(--accent-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .logo-mark svg { width: 21px; height: 21px; }

    .logo h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .logo .tagline { font-size: 11.5px; color: var(--text-faint); margin-top: 2px; }

    .body { padding: 16px 20px 18px; }

    .open-btn {
      width: 100%;
      height: 40px;
      background: var(--accent);
      color: var(--accent-on);
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 550;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background .14s ease, transform .08s ease;
    }
    .open-btn svg { width: 15px; height: 15px; }
    .open-btn:hover { background: var(--accent-hover); }
    .open-btn:active { transform: translateY(1px); }

    .features {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .feature-icon {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      flex-shrink: 0;
    }
    .feature-icon svg { width: 14px; height: 14px; }

    .setting-row {
      margin-top: 16px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .setting-text { min-width: 0; }
    .setting-label { font-size: 12.5px; font-weight: 500; color: var(--text); }
    .setting-desc { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    .switch {
      flex-shrink: 0;
      width: 38px;
      height: 22px;
      border-radius: 999px;
      border: none;
      background: var(--border);
      cursor: pointer;
      position: relative;
      transition: background .16s ease;
      padding: 0;
    }
    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,.25);
      transition: transform .16s ease;
    }
    .switch.on { background: var(--accent); }
    .switch.on::after { transform: translateX(16px); }

    .footer {
      padding: 11px 20px;
      border-top: 1px solid var(--border);
      font-size: 10.5px;
      color: var(--text-faint);
      text-align: center;
      letter-spacing: .01em;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/>
          <path d="M2 21c0-3 1.85-5.36 5.08-6"/>
        </svg>
      </div>
      <div>
        <h1>Leaflet Mark View</h1>
        <div class="tagline">本地 Markdown 阅读器</div>
      </div>
    </div>
  </div>

  <div class="body">
    <button class="open-btn" id="openBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
      </svg>
      打开阅读器
    </button>

    <div class="features">
      <div class="feature">
        <span class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
        </span>
        本地文件夹递归浏览，全文搜索
      </div>
      <div class="feature">
        <span class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 7h14M5 7l3.5 5L5 17M14 17h5"/></svg>
        </span>
        数学公式 · Mermaid 图表 · 代码高亮
      </div>
      <div class="feature">
        <span class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><path d="M9 20h6M12 4v16"/><path d="m16 11 3 3-3 3"/></svg>
        </span>
        一键转 Confluence Wiki Markup
      </div>
      <div class="feature">
        <span class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/></svg>
        </span>
        零网络请求，不上传任何文件
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-text">
        <div class="setting-label">接管新标签页</div>
        <div class="setting-desc">关闭后新标签页跳转 Google</div>
      </div>
      <button class="switch" id="newtabToggle" role="switch" aria-checked="true"
        aria-label="接管新标签页" title="新标签页是否显示主页"></button>
    </div>
  </div>

  <div class="footer">Leaflet Mark View · v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
